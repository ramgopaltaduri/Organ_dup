
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kidney Prediction</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='prediction.css') }}">
  <style>
    /* Kidney-specific layout fixes ONLY */
    .grid-form { padding: 0 18px 18px; }
    .grid-form .row { display: flex; gap: 12px; margin-bottom: 12px; }
    .grid-form input, .grid-form select { flex: 1; min-width: 0; }
    .grid-form input[type="text"] { font-size: 13px; }
    .grid-form .submit-btn { margin-top: 10px; }
  </style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <a href="/">←</a>
    <h2>New Prediction</h2>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="active">Kidney</button>
    <a href="/heart">Heart</a>
    <a href="/liver">Liver</a>
    <a href="/lung">Lung</a>
  </div>

  <h3>Enter Kidney Transplant Data</h3>

  <form method="POST" action="/predict/kidney" class="grid-form">

    <!-- Recipient -->
    <div class="row">
      <input type="number" id="recipient_age" name="recipient_age" placeholder="Recipient Age" required>
      <select id="recipient_sex" name="recipient_sex" required>
        <option value="">Sex</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>
    </div>

    <div class="row">
      <select id="recipient_blood_type" name="recipient_blood_type" required>
        <option value="">Recipient ABO</option>
        <option>A</option><option>B</option><option>AB</option><option>O</option>
      </select>
      <select id="recipient_rh" name="recipient_rh" required>
        <option value="">Recipient Rh</option>
        <option>Positive</option>
        <option>Negative</option>
      </select>
    </div>

    <div class="row">
      <input type="number" step="0.1" id="recipient_years_on_dialysis" name="recipient_years_on_dialysis" placeholder="Years on Dialysis">
      <input type="number" step="0.1" id="recipient_creatinine" name="recipient_creatinine" placeholder="Creatinine (mg/dL)">
    </div>

    <div class="row">
      <input type="number" step="0.1" id="recipient_egfr" name="recipient_egfr" placeholder="eGFR">
      <input type="number" id="recipient_pra" name="recipient_pra" placeholder="PRA (%)">
    </div>

    <div class="row">
      <input type="text" id="recipient_hla" name="recipient_hla" placeholder="Recipient HLA Typing">
      <select id="recipient_cmv" name="recipient_cmv">
        <option value="">CMV Status</option>
        <option>Positive</option>
        <option>Negative</option>
        <option>Unknown</option>
      </select>
    </div>

    <div class="row">
      <select id="recipient_ebv" name="recipient_ebv">
        <option value="">EBV Status</option>
        <option>Positive</option>
        <option>Negative</option>
        <option>Unknown</option>
      </select>
      <input type="text" id="recipient_sensitization_history" name="recipient_sensitization_history" placeholder="Sensitization History">
    </div>

    <!-- Donor -->
    <div class="row">
      <select id="donor_type" name="donor_type">
        <option value="">Donor Type</option>
        <option>Living</option>
        <option>Deceased</option>
      </select>
      <input type="number" id="donor_age" name="donor_age" placeholder="Donor Age">
    </div>

    <div class="row">
      <input type="number" step="0.1" id="donor_bmi" name="donor_bmi" placeholder="Donor BMI">
      <select id="donor_blood_type" name="donor_blood_type">
        <option value="">Donor ABO</option>
        <option>A</option><option>B</option><option>AB</option><option>O</option>
      </select>
    </div>

    <div class="row">
      <select id="donor_rh" name="donor_rh">
        <option value="">Donor Rh</option>
        <option>Positive</option>
        <option>Negative</option>
      </select>
      <input type="number" step="0.1" id="donor_cold_ischemia_time" name="donor_cold_ischemia_time" placeholder="Cold Ischemia Time (hrs)">
    </div>

    <div class="row">
      <input type="text" id="donor_hla" name="donor_hla" placeholder="Donor HLA Typing">
      <select id="crossmatch_result" name="crossmatch_result">
        <option value="">Crossmatch Result</option>
        <option>Negative</option>
        <option>Positive</option>
      </select>
    </div>

    <button type="submit" class="submit-btn">Get Prediction</button>
  </form>
</div>
</body>
</html>
