
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Generating Prediction</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      background: #f6f7f8;
    }

    .container {
      width: 375px;
      height: 100vh;
      background: #ffffff;
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
      text-align: center;
    }

    .progress {
      width: 100%;
      height: 6px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: #3b82f6;
      border-radius: 999px;
      animation: load 2s linear forwards;
    }

    @keyframes load {
      from { width: 0%; }
      to { width: 100%; }
    }

    p {
      font-size: 13px;
      color: #6b7280;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Generating Your Prediction</h2>

    <div class="progress">
      <div class="progress-bar"></div>
    </div>

    <p>Our model is analyzing thousands of data points...</p>
  </div>

  <script>
    setTimeout(() => {
      window.location.href = "/result";
    }, 2000);
  </script>

</body>
</html>
