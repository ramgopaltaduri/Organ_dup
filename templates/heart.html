
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heart Prediction</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='prediction.css') }}">
</head>

<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <a href="/">←</a>
    <h2>New Prediction</h2>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <a href="/kidney">Kidney</a>
    <a href="/liver">Liver</a>
    <button class="active">Heart</button>
    <a href="/lung">Lung</a>
  </div>

  <h3>Enter Heart Transplant Data</h3>

  <!-- FORM -->
  <form method="POST" action="/predict/heart" id="organForm" class="grid-form">

    <!-- Row 1 -->
    <div class="row">
      <input name="AGE" type="number" placeholder="Recipient Age" required>
      <input name="AGE_DON" type="number" placeholder="Donor Age" required>
    </div>

    <!-- Row 2 -->
    <div class="row">
      <input name="CREAT_TRR" type="number" step="any" placeholder="Recipient Creatinine">
      <input name="CREAT_DON" type="number" step="any" placeholder="Donor Creatinine">
    </div>

    <!-- Row 3 -->
    <div class="row">
      <input name="BMI_CALC" type="number" step="any" placeholder="Recipient BMI">
      <input name="BMI_DON_CALC" type="number" step="any" placeholder="Donor BMI">
    </div>

    <!-- Row 4 -->
    <div class="row">
      <input name="DAYSWAIT_CHRON" type="number" placeholder="Days on Waiting List">
      <select name="medcondition">
        <option value="">Medical Condition (0 / 1 / 2)</option>
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
      </select>
    </div>

    <!-- Row 5 -->
    <div class="row">
      <select name="ABOMAT">
        <option value="">Blood Type Match</option>
        <option value="1">Match</option>
        <option value="0">No Match</option>
      </select>
      <input name="DISTANCE" type="number" step="any" placeholder="Distance (km)">
    </div>

    <!-- Row 6 -->
    <div class="row">
      <input name="TX_YEAR" type="number" placeholder="Transplant Year">
      <select name="diagnosis">
        <option value="">Diagnosis</option>
        <option>CONGENITAL</option>
        <option>FAILED OHT</option>
        <option>HCM</option>
        <option>ICM</option>
        <option>NICM</option>
        <option>OTHER/UNKNOWN</option>
        <option>RESTRICTIVE</option>
        <option>VALVULAR</option>
      </select>
    </div>

    <!-- Row 7 -->
    <div class="row">
      <select name="mcs">
        <option value="">Medical Condition Score (MCS)</option>
        <option>ECMO</option>
        <option>IABP</option>
        <option>bivad/tah</option>
        <option>dischargeable VAD</option>
        <option>left endo device</option>
        <option>non-dischargeable VAD</option>
        <option>none</option>
        <option>right endo device</option>
      </select>

      <select name="abo">
        <option value="">Recipient Blood Group</option>
        <option>A</option>
        <option>AB</option>
        <option>B</option>
        <option>O</option>
      </select>
    </div>

    <!-- Row 8 -->
    <div class="row">
      <select name="CODDON">
        <option value="">Donor Cause of Death</option>
        <option>Anoxia/Asphyx</option>
        <option>Cardiovascular</option>
        <option>Drowning</option>
        <option>Drug Intoxication</option>
        <option>IntracranHem/Stroke/Seiz</option>
        <option>Natural Causes</option>
        <option>Trauma</option>
      </select>

      <select name="HIST_MI">
        <option value="">History of Myocardial Infarction</option>
        <option>No</option>
        <option>Yes</option>
      </select>
    </div>

    <!-- Row 9 -->
    <div class="row">
      <select name="diabetes">
        <option value="">History of Diabetes</option>
        <option>No</option>
        <option>Yes</option>
      </select>

      <div></div> <!-- empty column to keep alignment -->
    </div>

    <button type="submit" class="submit-btn">Get Prediction</button>

  </form>
</div>
</body>
</html>
